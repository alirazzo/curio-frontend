<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Curio">
  <meta name="theme-color" content="#0d0f14" id="theme-color-meta">
  <title>Curio</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app" data-theme="dark">

    <header class="topbar">
      <div class="logo">curi<em>o</em></div>
      <div class="topbar-actions">

        <!-- Shuffle — dice icon (less angular) -->
        <button class="icon-btn shuf-btn" id="shuf-btn" aria-label="Shuffle" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="20" rx="5"/>
            <circle cx="8.5" cy="8.5" r="1.4" fill="currentColor" stroke="none"/>
            <circle cx="15.5" cy="8.5" r="1.4" fill="currentColor" stroke="none"/>
            <circle cx="12"   cy="12"  r="1.4" fill="currentColor" stroke="none"/>
            <circle cx="8.5" cy="15.5" r="1.4" fill="currentColor" stroke="none"/>
            <circle cx="15.5" cy="15.5" r="1.4" fill="currentColor" stroke="none"/>
          </svg>
        </button>

        <!-- Filter dropdown -->
        <div class="filter-wrap" id="filter-wrap" style="display:none">
          <button class="icon-btn filter-btn" id="filter-btn" aria-label="Filter by topic">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round">
              <line x1="4" y1="6" x2="20" y2="6"/>
              <line x1="8" y1="12" x2="16" y2="12"/>
              <line x1="11" y1="18" x2="13" y2="18"/>
            </svg>
          </button>
          <div class="filter-dropdown" id="filter-dropdown">
            <button class="filter-opt active" data-topic="all">All categories</button>
            <button class="filter-opt" data-topic="life-sciences">Life Sciences</button>
            <button class="filter-opt" data-topic="medicine">Medicine &amp; Health</button>
            <button class="filter-opt" data-topic="pharma">Pharma &amp; Biotech</button>
            <button class="filter-opt" data-topic="ai-tech">AI &amp; Technology</button>
            <button class="filter-opt" data-topic="physical-sciences">Physical Sciences</button>
            <button class="filter-opt" data-topic="space">Space &amp; Cosmos</button>
            <button class="filter-opt" data-topic="earth">Earth &amp; Environment</button>
            <button class="filter-opt" data-topic="society">Society, Mind &amp; Economy</button>
            <button class="filter-opt" data-topic="history">History &amp; Civilisation</button>
            <button class="filter-opt" data-topic="arts-culture">Arts &amp; Culture</button>
          </div>
        </div>

        <!-- Theme toggle -->
        <button class="icon-btn" id="theme-btn" aria-label="Toggle theme">
          <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="feed" id="feed">

      <!-- Discover tab -->
      <div id="feed-discover" class="feed-section">
        <div class="loading-state" id="discover-loading">
          <div class="spinner"></div>
          <p>Gathering discoveries…</p>
        </div>
        <div id="discover-cards"></div>
      </div>

      <!-- Saved tab -->
      <div id="feed-saved" class="feed-section" style="display:none">
        <p class="section-label">Saved articles</p>
        <div id="saved-list"></div>
        <p class="empty-state" id="saved-empty" style="display:none">Nothing saved yet — tap the bookmark on any card.</p>
      </div>

    </main>

    <nav class="bottom-nav">
      <button class="nav-item active" data-tab="discover">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
        <span>Discover</span>
      </button>
      <button class="nav-item" data-tab="saved">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
        </svg>
        <span>Saved</span>
      </button>
    </nav>

  </div>
  <script src="app.js"></script>
</body>
</html>
